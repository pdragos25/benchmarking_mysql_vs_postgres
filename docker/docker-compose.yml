version: '3.8'

services:
  mysql-test:
    image: mysql:8.0
    container_name: benchmark_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: benchmark_db
    ports:
      - "3306:3306"

  postgres-test:
    image: postgres:15
    container_name: benchmark_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: benchmark_db
    ports:
      - "5432:5432"